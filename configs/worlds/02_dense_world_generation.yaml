world:
  name: 02_dense
  width: 50.0
  height: 50.0
  wall_height: 2.0
  wall_thickness: 0.5
  ground_thickness: 0.5

grid:
  resolution: 0.2

noise:
  seed: 227
  scale: 35.0
  octaves: 4
  persistence: 0.5
  lacunarity: 2.0
  normalize_min: 0.0
  normalize_max: 1.0

sampling:
  engine: sobol
  num_candidates: 2000
  sobol_scramble: true
  acceptance_bias: 0.2
  acceptance_gain: 0.5
  random_seed: 1234

placement:
  min_spacing: 4.0
  selection_policy: density_descending
  max_obstacles: 81
  boundary_margin: 0.6

generation:
  random_seed: 13649
  z_base: 0.0
  default_obstacle_height: 2.0

analysis:
  area_resolution: 0.05

visualization:
  output_dir: results/exp1_map/world_generation/02_dense
  density_image_name: density_field.png
  show_axes: true
  dpi: 180
  point_size: 8
  candidate_alpha: 0.20
  accepted_alpha: 0.45
  selected_alpha: 0.95
  draw_spacing_circle: false
  save_density_only: true
  save_candidates_overlay: true
  save_accepted_overlay: true
  save_selected_overlay: true
  obstacle_alpha: 0.80
  wall_alpha: 0.0
  save_layout_preview: true

obstacle_catalog:
  enabled_types:
    - box_large
    - cylinder_pillar
    - wall_segment

  types:
    box_large:
      kind: box
      weight: 33.0
      size_x_range: [3.0, 4.8]
      size_y_range: [3.0, 4.2]
      yaw_mode: axis_aligned

    cylinder_pillar:
      kind: cylinder
      weight: 27.0
      radius_range: [0.5, 1.5]
      yaw_mode: free

    wall_segment:
      kind: box
      weight: 21.0
      size_x_range: [2.2, 5.0]
      size_y_range: [0.35, 0.7]
      yaw_mode: axis_aligned_or_45
