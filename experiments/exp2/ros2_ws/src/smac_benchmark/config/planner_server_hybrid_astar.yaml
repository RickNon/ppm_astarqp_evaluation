planner_server:
  ros__parameters:
    expected_planner_frequency: 0.0
    planner_plugins: ["Hybrid"]

    Hybrid:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"

      goal_heading_mode: "ALL_DIRECTION" # goal yaw is not constrained
      coarse_search_resolution: 2

      tolerance: 0.25
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 2000
      max_planning_time: 30.0
      smooth_path: true
      cost_penalty: 5.0


