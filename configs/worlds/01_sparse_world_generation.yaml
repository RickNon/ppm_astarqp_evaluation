world:
  name: 01_sparse
  width: 50.0
  height: 50.0
  wall_height: 2.0
  wall_thickness: 0.5
  ground_thickness: 0.5

grid:
  resolution: 0.2

noise:
  seed: 32
  scale: 18.0
  octaves: 4
  persistence: 0.5
  lacunarity: 2.0
  normalize_min: 0.0
  normalize_max: 1.0

sampling:
  engine: sobol
  num_candidates: 1500
  sobol_scramble: true
  acceptance_bias: 0.05
  acceptance_gain: 0.95
  random_seed: 1234

placement:
  min_spacing: 1.6
  selection_policy: density_descending
  max_obstacles: 120
  boundary_margin: 0.6

generation:
  random_seed: 2026
  z_base: 0.0
  default_obstacle_height: 2.0

analysis:
  area_resolution: 0.05

visualization:
  output_dir: results/exp1_map/world_generation/01_sparse
  density_image_name: density_field.png
  show_axes: true
  dpi: 180
  point_size: 8
  candidate_alpha: 0.20
  accepted_alpha: 0.45
  selected_alpha: 0.95
  draw_spacing_circle: false
  save_density_only: true
  save_candidates_overlay: true
  save_accepted_overlay: true
  save_selected_overlay: true
  obstacle_alpha: 0.80
  wall_alpha: 0.0
  save_layout_preview: true

obstacle_catalog:
  enabled_types:
    - box_small
    - box_large
    - cylinder_pillar
    - wall_segment

  types:
    box_small:
      kind: box
      weight: 3.0
      size_x_range: [0.6, 1.4]
      size_y_range: [0.6, 1.3]
      yaw_mode: axis_aligned

    box_large:
      kind: box
      weight: 1.8
      size_x_range: [1.4, 2.8]
      size_y_range: [1.0, 2.2]
      yaw_mode: axis_aligned

    cylinder_pillar:
      kind: cylinder
      weight: 1.6
      radius_range: [0.35, 0.85]
      yaw_mode: free

    wall_segment:
      kind: box
      weight: 1.4
      size_x_range: [2.2, 5.0]
      size_y_range: [0.35, 0.7]
      yaw_mode: axis_aligned_or_45
